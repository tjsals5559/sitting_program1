<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎒 몽글몽글 우리 반 자리 배치도</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 몽글몽글 우리 반 자리 ✨</h1>
            <p class="subtitle">모두가 즐거운 우리 반 자리 바꾸기 시간!</p>
        </header>

        <section class="controls">
            <div class="input-group">
                <label for="studentNames">📝 학생 명단 입력 (쉼표나 띄어쓰기로 구분)</label>
                <textarea id="studentNames" placeholder="예: 강백호, 서태웅, 송태섭..."></textarea>
            </div>
            
            <div class="setting-group">
                <div class="select-box">
                    <label for="layoutSelect">📐 배열 스타일 선택</label>
                    <select id="layoutSelect">
                        <option value="single">🚶 한 줄 버전 (5열 × 7행)</option>
                        <option value="pair" selected>👫 짝꿍 버전 (6열 × 6행)</option>
                    </select>
                </div>
                <div class="buttons">
                    <button id="shuffleBtn" class="btn-primary">🎲 랜덤 자리 배치</button>
                    <button id="resetBtn" class="btn-secondary">🔓 모든 고정 해제</button>
                </div>
            </div>
        </section>

        <main class="classroom">
            <div class="teacher-desk">👨‍🏫 교 탁</div>
            <div id="seatGrid" class="grid-pair"></div>
        </main>
        
        <footer>
            <p>📌 <strong>사용 팁:</strong> 자리를 섞기 전, 고정하고 싶은 자리가 있다면 해당 칸의 <strong>고정</strong> 버튼을 누르세요!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
