<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎒 몽글몽글 우리 반 자리 배치도</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 몽글몽글 우리 반 자리 ✨</h1>
            <p class="subtitle">모두가 즐거운 우리 반 자리 바꾸기 시간!</p>
        </header>

        <section class="controls">
            <div class="input-group">
                <label for="studentNames">📝 학생 명단 (쉼표로 구분)</label>
                <textarea id="studentNames" placeholder="강백호, 서태웅, 송태섭..."></textarea>
            </div>
            
            <div class="setting-group">
                <div class="select-box">
                    <label>📐 배열 선택</label>
                    <select id="layoutSelect">
                        <option value="single">한 줄 버전 (5 * 7)</option>
                        <option value="pair">짝꿍 버전 (6 * 6)</option>
                    </select>
                </div>
                <div class="buttons">
                    <button id="shuffleBtn" class="btn-primary">🎨 자리 바꾸기</button>
                    <button id="resetBtn" class="btn-secondary">🔄 초기화</button>
                </div>
            </div>
        </section>

        <main class="classroom">
            <div class="teacher-desk">👨‍🏫 교 탁</div>
            <div id="seatGrid" class="grid-single">
                </div>
        </main>
        
        <footer>
            <p>📌 팁: 자리를 고정하려면 책상의 🔒 아이콘을 클릭하세요!</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
